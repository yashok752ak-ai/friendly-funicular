<body>
<div id="root"></div>

<div id="syncBar"></div>
<script>
// ═══════════════════════════════════════════════
// GOOGLE SHEETS SYNC — URL HARDCODED
// ═══════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVk4MsQUEbU7f45j5QSh4pD44vzTuz7ATPf2tNBCR-EA6Iaz62mrYqL-ISTwZ2L7wvdA/exec";

let _syncTimer  = null;
let _pendingSave = {};
let _syncing    = false;

// ── PENDING SAVE QUEUE — persisted in localStorage so browser close safe ──
const SaveQueue = {
  _key: "jpl_pending_queue",
  get()    { try { return JSON.parse(localStorage.getItem(this._key)||"{}"); } catch { return {}; } },
  set(q)   { try { localStorage.setItem(this._key, JSON.stringify(q)); } catch(e){} },
  add(key, data) {
    const q = this.get();
    q[key] = data;
    this.set(q);
  },
  remove(keys) {
    const q = this.get();
    keys.forEach(k => delete q[k]);
    this.set(q);
  },
  clear()  { localStorage.removeItem(this._key); },
  hasItems() { return Object.keys(this.get()).length > 0; }
};

const SyncBar = {
  _timer: null,
  show(type, msg) {
    const bar = document.getElementById("syncBar");
    if (!bar) return;
    // Clear any existing timer
    if (this._timer) clearTimeout(this._timer);
    // Only show ONE pill at a time
    bar.innerHTML = `<div class="sync-pill sync-${type}">${msg}</div>`;
    // Auto hide after 2 seconds for all types
    this._timer = setTimeout(() => { bar.innerHTML = ""; }, 2000);
  }
};

const GSync = {
  _autoTimer: null,
  _lastSyncTime: 0,

  // ── SIMPLE FETCH — works from https:// origin ─────────────
  async _call(params) {
    const url = SCRIPT_URL + "?" + Object.entries({...params, t: Date.now()})
      .map(([k,v]) => k + "=" + encodeURIComponent(typeof v === "object" ? JSON.stringify(v) : v))
      .join("&");
    const res = await fetch(url, {mode:"cors", cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  },

  // ── LOAD ALL ──────────────────────────────────────────────
  async loadAll(silent=false) {
    try {
      if(!silent) SyncBar.show("loading", "⏳ Sync ho raha hai...");
      const allKeys = ["categories","batchOptions","users","itemMaster",
                       "packings","dispatches","purchaseOrders",
                       "mtItems","mtPos","mtDispatches","mtPackings"];
      let updated = false;
      for(const key of allKeys) {
        try {
          const res = await this._call({action:"get", key});
          const data = Array.isArray(res.data) ? res.data : (Array.isArray(res) ? res : null);
          if(data === null) continue;
          const km = this._km[key];
          if(!km) continue;
          const local = state[km.sk] || [];
          const merged = this._merge(data, local);
          if(JSON.stringify(merged) !== JSON.stringify(local)) {
            state[km.sk] = merged;
            DB.save(km.dbk, merged);
            updated = true;
          }
          await new Promise(r => setTimeout(r, 300));
        } catch(e) { console.warn("Skip:", key, e.message); }
      }
      this._lastSyncTime = Date.now();
      if(!silent) SyncBar.show("ok", "✅ Sync complete!");
      return updated;
    } catch(e) {
      if(!silent) SyncBar.show("err", "❌ Sync failed: " + e.message);
      return false;
    }
  },

  // ── MERGE ─────────────────────────────────────────────────
  _merge(sheetArr, localArr) {
    if (!Array.isArray(sheetArr) || sheetArr.length === 0) return localArr || [];
    if (!Array.isArray(localArr) || localArr.length === 0) return sheetArr;
    const map = {};
    sheetArr.forEach(item => { if(item?.id) map[item.id] = item; });
    localArr.forEach(item => {
      if(!item?.id) return;
      if(!map[item.id]) { map[item.id] = item; }
      else {
        const st = new Date(map[item.id].savedAt||0).getTime();
        const lt = new Date(item.savedAt||0).getTime();
        if(lt > st) map[item.id] = item;
      }
    });
    return Object.values(map).sort((a,b) => Number(a.id)-Number(b.id));
  },

  // ── SCHEDULE SAVE ─────────────────────────────────────────
  scheduleSave(key, data) {
    _pendingSave[key] = data;
    SaveQueue.add(key, Array.isArray(data) && data[0]?.id ? data.slice(-3) : data);
    if (_syncTimer) clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => GSync.flushSave(), 1500);
  },

  // ── FLUSH SAVE ────────────────────────────────────────────
  async flushSave() {
    if (_syncing) return;
    const lsQ = SaveQueue.get();
    const combined = {...lsQ, ..._pendingSave};
    if (!Object.keys(combined).length) return;
    _syncing = true;
    SyncBar.show("saving", "☁️ Saving...");
    const batch = {...combined};
    _pendingSave = {};
    const reverseMap = {
      packings:"packings", dispatches:"dispatches", pos:"purchaseOrders",
      item_master:"itemMaster", categories:"categories", batch_options:"batchOptions",
      users:"users", mt_items:"mtItems", mt_pos:"mtPos",
      mt_dispatches:"mtDispatches", mt_packings:"mtPackings"
    };
    try {
      for(const [dbKey, data] of Object.entries(batch)) {
        const sheetKey = reverseMap[dbKey];
        if(!sheetKey) continue;
        const isSimple = Array.isArray(data) && (data.length===0 || !data[0]?.id);
        const send = isSimple ? data : (Array.isArray(data) ? data.slice(-3) : data);
        await this._call({action:"upsert", key:sheetKey, data:send});
      }
      SaveQueue.clear();
      SyncBar.show("ok", "✅ Saved to Sheets!");
    } catch(e) {
      SyncBar.show("err", "❌ Save failed — retry hoga");
      Object.assign(_pendingSave, batch);
      setTimeout(() => GSync.flushSave(), 15000);
    }
    _syncing = false;
  },

  // ── MANUAL SYNC ───────────────────────────────────────────
  async pullNow() {
    const updated = await GSync.loadAll(false);
    if(updated) { softRefreshCurrentTab(); }
  },

  // ── AUTO SYNC ─────────────────────────────────────────────
  startAutoSync() {
    if(this._autoTimer) clearInterval(this._autoTimer);
    this._autoTimer = setInterval(async () => {
      if(!state.currentUser || _syncing) return;
      if(Object.keys(_pendingSave).length > 0 || SaveQueue.hasItems()) {
        await GSync.flushSave();
      }
    }, 30000);
  },

  stopAutoSync() {
    if(this._autoTimer) { clearInterval(this._autoTimer); this._autoTimer = null; }
  },

  // ── KEY MAP ───────────────────────────────────────────────
  _km: {
    packings:      {sk:"packings",       dbk:"packings"},
    dispatches:    {sk:"dispatches",     dbk:"dispatches"},
    purchaseOrders:{sk:"purchaseOrders", dbk:"pos"},
    itemMaster:    {sk:"itemMaster",     dbk:"item_master"},
    categories:    {sk:"categories",     dbk:"categories"},
    batchOptions:  {sk:"batchOptions",   dbk:"batch_options"},
    users:         {sk:"users",          dbk:"users"},
    mtItems:       {sk:"mtItems",        dbk:"mt_items"},
    mtPos:         {sk:"mtPos",          dbk:"mt_pos"},
    mtDispatches:  {sk:"mtDispatches",   dbk:"mt_dispatches"},
    mtPackings:    {sk:"mtPackings",     dbk:"mt_packings"}
  }
}

// ── localStorage DB ───────────────────────────
const DB = {
  get(key)       { try { return JSON.parse(localStorage.getItem("jpl_"+key)||"null"); } catch { return null; } },
  save(key,data) { try { localStorage.setItem("jpl_"+key,JSON.stringify(data)); } catch(e){ console.error(e); } }
};

function persist(key, data) {
  DB.save(key, data);
  GSync.scheduleSave(key, data);
}

// ── DEFAULTS ──────────────────────────────────
const DEFAULT_BATCH = ["ONE PLUS","STACK LINE","PURPLE","GLASS LOOK","DENMARK","KIA","BOTTLE"];
const DEFAULT_CATS  = ["Jar","Bottle","Lunchbox","Diwali Item"];
const INIT_USERS    = [{id:1,username:"admin",password:"admin123",role:"admin",name:"Admin User",
  permissions:{packing:true,pendingStock:true,stockSummary:true,dispatch:true,dispatchRegister:true,
    po:true,pendingOrder:true,mtPo:true,mtDispatch:true,mtPending:true,mtPacking:true,userManagement:true}}];
const PERMS = ["packing","pendingStock","stockSummary","dispatch","dispatchRegister","po","pendingOrder","mtPo","mtDispatch","mtPending","mtPacking"];
const PERM_LABELS = {packing:"Packing",pendingStock:"Pending Stock",stockSummary:"Stock Summary",dispatch:"Dispatch",
  dispatchRegister:"Dispatch Register",po:"Purchase Order",pendingOrder:"Pending Orders",
  mtPo:"MT PO",mtDispatch:"MT Dispatch",mtPending:"MT Pending",mtPacking:"MT Packing"};

// ── STATE ─────────────────────────────────────
let state = {
  currentUser:null,
  users:INIT_USERS, packings:[], categories:DEFAULT_CATS, batchOptions:DEFAULT_BATCH,
  itemMaster:[], dispatches:[], purchaseOrders:[],
  mtItems:[], mtPos:[], mtDispatches:[], mtPackings:[],
  activeTab:"packing"
};
let temp = {
  editPackingId:null, editPOId:null, editMtPoId:null, editMtPackingId:null, editUserId:null,
  poItems:[], dispatchItems:[], mtPoItems:[], mtDispatchItems:[],
  mtModalOpen:false, mtModalEditId:null, itemMasterOpen:false, itemMasterEditId:null
};

const todayStr = ()=>new Date().toISOString().slice(0,10);
const nowStr   = ()=>new Date().toLocaleString("en-IN");
const fmtDate  = d=>d?new Date(d).toLocaleDateString("en-IN"):"";
const esc      = s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const uid      = ()=>Date.now()+Math.floor(Math.random()*9999);
const genCarton  = ()=>state.packings.length?Math.max(...state.packings.map(x=>Number(x.cartonNo)||0))+1:1;
const genChallan = ()=>state.dispatches.length?Math.max(...state.dispatches.map(x=>Number(x.challanNo)||0))+1:1001;
const genMtChal  = ()=>state.mtDispatches.length?Math.max(...state.mtDispatches.map(x=>Number(x.challanNo)||2000))+1:2001;
const getDays    = d=>{if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);return Math.ceil((dd-t)/86400000);};

function exportCSV(headers,rows,fn){
  const csv=[headers.join(","),...rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:fn});
  document.body.appendChild(a);a.click();a.remove();
}
function alertBadge(days){
  if(days==null)return"";
  if(days<0) return`<span class="badge" style="background:#b71c1c;">OVERDUE ${Math.abs(days)}d</span>`;
  if(days<=3)return`<span class="badge" style="background:#c62828;">🔴 ${days}d</span>`;
  if(days<=7)return`<span class="badge" style="background:#e65100;">🟠 ${days}d</span>`;
  return`<span class="badge" style="background:#2e7d32;">✅ ${days}d</span>`;
}
function can(p){const u=state.currentUser;if(!u)return false;return u.role==="admin"||!!(u.permissions&&u.permissions[p])||!!u.readOnly;}
function isRO(){const u=state.currentUser;return!!u&&u.role!=="admin"&&!!u.readOnly;}
function roBanner(){return isRO()?`<div class="ro-banner">👁️ <b>Read Only Mode</b></div>`:"";}
function buildDispMap(){
  const m={};
  state.dispatches.forEach(d=>(d.items||[]).forEach(i=>{
    const k=`${i.cartonNo}-${i.productName}`;m[k]=(m[k]||0)+Number(i.qty||0);
  }));
  return m;
}
// ── AUTOCOMPLETE ──────────────────────────────
const _acSugg={};
const AC={
  init(id,sugg){_acSugg[id]=sugg||[];},
  open(id){AC.filter(id);const d=document.getElementById(id+"_drop");if(d)d.classList.add("open");},
  blur(id){setTimeout(()=>{const d=document.getElementById(id+"_drop");if(d)d.classList.remove("open");},200);},
  filter(id){
    const inp=document.getElementById(id),drop=document.getElementById(id+"_drop");
    if(!inp||!drop)return;
    const q=(inp.value||"").toLowerCase(),sugg=(_acSugg[id]||[]).filter(s=>s!=null);
    const f=sugg.filter(s=>String(s).toLowerCase().includes(q));
    drop.innerHTML=f.map(s=>`<div class="ac-item" onmousedown="AC.pick('${id}','${esc(s)}')">${esc(s)}</div>`).join("")||`<div class="ac-item" style="color:#999">No match</div>`;
    drop.classList.add("open");
  },
  pick(id,val){
    const inp=document.getElementById(id);if(!inp)return;
    inp.value=val;
    const d=document.getElementById(id+"_drop");if(d)d.classList.remove("open");
    if(id==="pkProduct")PackingApp.autofillProduct(val);
    if(id==="poItemName")POApp.autofillPOItem(val);
  }
};
function acInput(id,sugg,opts={}){
  const val=esc(opts.value||""),ph=esc(opts.placeholder||""),dis=opts.disabled?"disabled":"";
  const items=sugg.map(s=>`<div class="ac-item" onmousedown="AC.pick('${id}','${esc(s)}')">${esc(s)}</div>`).join("");
  return`<div class="ac-wrap"><input class="inp" id="${id}" value="${val}" placeholder="${ph}" ${dis} autocomplete="off" oninput="AC.filter('${id}')" onfocus="AC.open('${id}')" onblur="AC.blur('${id}')"><div class="ac-drop" id="${id}_drop">${items}</div></div>`;
}
function setupEnterNav(){
  document.addEventListener("keydown",function(e){
    if(e.key!=="Enter")return;
    const tag=e.target.tagName;
    if(tag==="TEXTAREA"||tag==="BUTTON")return;
    if(e.target.closest(".ac-drop"))return;
    e.preventDefault();
    const focusable=[...document.querySelectorAll('input:not([disabled]):not([readonly]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), button:not([disabled])')].filter(el=>{const s=window.getComputedStyle(el);return s.display!=="none"&&s.visibility!=="hidden"&&el.offsetParent!==null;});
    const idx=focusable.indexOf(e.target);
    if(idx>-1&&idx<focusable.length-1)focusable[idx+1].focus();
  },true);
}
function registerAC(){
  const imNames=state.itemMaster.map(i=>i.name);
  const allParties=[...new Set(state.purchaseOrders.map(p=>p.partyName).filter(Boolean))];
  const allDests=[...new Set([...state.dispatches.map(d=>d.destination),...state.purchaseOrders.map(p=>p.destination)].filter(Boolean))];
  const allVehicles=[...new Set(state.dispatches.map(d=>d.vehicleNo).filter(Boolean))];
  const allTransports=[...new Set([...state.dispatches.map(d=>d.transport),...state.purchaseOrders.map(p=>p.transport)].filter(Boolean))];
  const allProducts=[...new Set([...imNames,...state.packings.map(p=>p.productName)])].sort();
  if(document.getElementById("pkProduct"))AC.init("pkProduct",allProducts);
  if(document.getElementById("poParty"))AC.init("poParty",allParties);
  if(document.getElementById("poDest"))AC.init("poDest",allDests);
  if(document.getElementById("poTransport"))AC.init("poTransport",allTransports);
  if(document.getElementById("poVehicle"))AC.init("poVehicle",allVehicles);
  if(document.getElementById("poItemName"))AC.init("poItemName",imNames);
  if(document.getElementById("dpParty"))AC.init("dpParty",allParties);
  if(document.getElementById("dpDest"))AC.init("dpDest",allDests);
  if(document.getElementById("dpTransport"))AC.init("dpTransport",allTransports);
  if(document.getElementById("dpVehicle"))AC.init("dpVehicle",allVehicles);
}

// ── PRINT FUNCTIONS ───────────────────────────

function renderTabContent(){
  const el=document.getElementById("tabContent");if(!el)return;
  const fns={packing:renderPackingTab,pendingStock:renderPendingStockTab,stockSummary:renderStockSummaryTab,
    dispatch:renderDispatchTab,dispatchRegister:renderDispatchRegisterTab,po:renderPOTab,
    pendingOrder:renderPendingOrderTab,mtPo:renderMTPoTab,mtDispatch:renderMTDispatchTab,
    mtPending:renderMTPendingTab,mtPacking:renderMTPackingTab,userManagement:renderUserManagementTab};
  el.innerHTML=(fns[state.activeTab]||(() =>""))();
  const mr=document.getElementById("modalRoot");if(mr)mr.innerHTML=renderItemMasterModal()+renderMtItemModal();
  setTimeout(registerAC,0);
}

function softRefreshCurrentTab(){
  try{
    const t=state.activeTab;
    if(t==="packing"){const b=document.getElementById("packingHistoryBody");if(b)b.innerHTML=packingHistoryRows();}
    else if(t==="pendingStock"){if(document.getElementById("psTable"))PendingStockApp.filterPendingStock();}
    else if(t==="stockSummary"){if(document.getElementById("ssTable"))StockSummaryApp.filterStockSummary();}
    else if(t==="dispatchRegister"){if(document.getElementById("drTable"))DispatchRegisterApp.filterDispatchRegister();}
    else if(t==="po"){const b=document.getElementById("poHistoryBody");if(b)b.innerHTML=poHistoryRows();}
    else if(t==="pendingOrder"){if(document.getElementById("poFTable"))PendingOrderApp.filterPendingOrders();}
    else if(t==="mtPo"){const b=document.getElementById("mtPoListBody");if(b)b.innerHTML=mtPoListRows();}
    else if(t==="mtDispatch"){const b=document.getElementById("mtDispatchBody");if(b)b.innerHTML=mtDispatchRegisterRows();}
    else if(t==="mtPending"){if(document.getElementById("mtpTable"))MTPendingApp.filterMtPending();}
    else if(t==="mtPacking"){const b=document.getElementById("mtPackingHistoryBody");if(b)b.innerHTML=mtPackingHistoryRows();}
    else if(t==="userManagement"){const b=document.getElementById("userListBody");if(b)b.innerHTML=userListRows();}
  }catch(e){}
}

  const rows=state.itemMaster.map(it=>`<tr><td><b>${esc(it.name)}</b></td><td>${esc(it.category)||"—"}</td><td>${esc(it.qtyType)||"—"}</td><td>${esc(it.qtyPerCarton)||"—"}</td><td>${esc(it.unit)||"—"}</td><td><button class="btn btn-sm btn-primary" onclick="App.editIMItem(${it.id})">Edit</button> <button class="btn btn-sm btn-danger" onclick="App.deleteIMItem(${it.id})">Del</button></td></tr>`).join("")||`<tr><td colspan="6" style="text-align:center;color:#999;padding:16px">Koi item nahi. Add karo.</td></tr>`;

tr></thead><tbody>${rows}</tbody></table></div></div></div></div>`;
}
const ItemMasterApp={
  openItemMaster(){temp.itemMasterOpen=true;temp.itemMasterEditId=null;_refreshModal();},
  closeItemMaster(){temp.itemMasterOpen=false;temp.itemMasterEditId=null;_refreshModal();setTimeout(registerAC,0);},
  saveIMItem(){const name=document.getElementById("imName").value.trim();if(!name){alert("Item Name required");return;}const entry={id:temp.itemMasterEditId||uid(),name,category:document.getElementById("imCat").value,qtyType:document.getElementById("imQtyType").value,qtyPerCarton:document.getElementById("imQtyPer").value,unit:document.getElementById("imUnit").value};if(temp.itemMasterEditId){state.itemMaster=state.itemMaster.map(i=>i.id===entry.id?entry:i);temp.itemMasterEditId=null;}else state.itemMaster.push(entry);persist("item_master",state.itemMaster);_refreshModal();setTimeout(registerAC,0);},
  editIMItem(id){temp.itemMasterEditId=id;_refreshModal();},
  cancelEditIMItem(){temp.itemMasterEditId=null;_refreshModal();},
  deleteIMItem(id){if(!confirm("Delete?"))return;state.itemMaster=state.itemMaster.filter(i=>i.id!==id);persist("item_master",state.itemMaster);_refreshModal();setTimeout(registerAC,0);}
};

dy">${packingHistoryRows()}</tbody></table></div></div>`;

  },
  printPendingStock(){

// ── STOCK SUMMARY ─────────────────────────────────────────
function stockSummaryRows(batchF,catF,prodF){
  const dispMap=buildDispMap();const sumMap={};
  state.packings.forEach(p=>{if(batchF&&p.batchNo!==batchF)return;if(catF&&p.category!==catF)return;if(prodF&&p.productName!==prodF)return;const k=`${p.batchNo}||${p.productName}||${p.category}||${p.qtyType}`;if(!sumMap[k])sumMap[k]={batchNo:p.batchNo,productName:p.productName,category:p.category,qtyType:p.qtyType,qtyPerCarton:p.qtyPerCarton,totalQty:0,dispatchedQty:0,pendingCartons:0};const dk=`${p.cartonNo}-${p.productName}`;const disp=dispMap[dk]||0;const pq=p.totalQty-disp;sumMap[k].totalQty+=p.totalQty;sumMap[k].dispatchedQty+=disp;if(pq>0)sumMap[k].pendingCartons+=p.qtyPerCarton?Math.ceil(pq/p.qtyPerCarton):Number(p.cartons||0);});
  return Object.values(sumMap).map(r=>({...r,pendingQty:r.totalQty-r.dispatchedQty})).filter(r=>r.pendingQty>0);
}
function renderStockSummaryTab(){
  const allProds=[...new Set(state.packings.map(p=>p.productName))];const allBatches=[...new Set(state.packings.map(p=>p.batchNo).filter(Boolean))];

// ── PENDING ORDER ─────────────────────────────────────────
function getPendingOrderRows(){
  const dispMap={};state.dispatches.forEach(d=>(d.items||[]).forEach(i=>{const k=`${d.partyName}-${i.productName}`;dispMap[k]=(dispMap[k]||0)+Number(i.qty||0);}));
  return state.purchaseOrders.flatMap(po=>(po.items||[]).filter(i=>!i.cancelled).map(item=>{const k=`${po.partyName}-${item.productName}`;const disp=dispMap[k]||0;const pend=item.qty-disp;return{poId:po.id,poNo:po.poNo,party:po.partyName,transport:po.transport,date:po.date,productName:item.productName,orderedQty:item.qty,unit:item.unit,dispatchedQty:disp,pendingQty:pend,itemId:item.id,status:po.status};})).filter(r=>r.pendingQty>0&&r.status!=="cancelled");
}
function getAvailableStockMap(){
  const dispMap=buildDispMap();const avail={};
  state.packings.forEach(p=>{const dk=`${p.cartonNo}-${p.productName}`;const disp=dispMap[dk]||0;const pq=p.totalQty-disp;if(pq>0){const key=p.productName;if(!avail[key])avail[key]={availQty:0,availCartons:0,qtyPerCarton:p.qtyPerCarton};if(p.qtyType==="Cts"){avail[key].availQty+=pq;avail[key].availCartons+=p.qtyPerCarton?Math.ceil(pq/p.qtyPerCarton):Number(p.cartons||0);}else{const cp=p.qtyPerCarton?Math.floor(pq/p.qtyPerCarton):Number(p.cartons||0);avail[key].availCartons+=cp;avail[key].availQty+=cp;}}});
  return avail;
}
function renderPendingOrderTab(){
  const all=getPendingOrderRows();const allP=[...new Set(state.purchaseOrders.map(p=>p.partyName))];const allPr=[...new Set(state.purchaseOrders.flatMap(p=>(p.items||[]).map(i=>i.productName)))];const allT=[...new Set(state.purchaseOrders.map(p=>p.transport).filter(Boolean))];
  return`<div class="card"><div class="card-title">⏳ Pending Orders</div><div class="card-body"><div class="filters"><select class="inp" id="poFParty" onchange="App.filterPendingOrders()"><option value="">All Parties</option>${allP.map(p=>`<option>${esc(p)}</option>`).join("")}</select><select class="inp" id="poFProd" onchange="App.filterPendingOrders()"><option value="">All Products</option>${allPr.map(p=>`<option>${esc(p)}</option>`).join("")}</select><select class="inp" id="poFCat" onchange="App.filterPendingOrders()"><option value="">All Categories</option>${state.categories.map(c=>`<option>${esc(c)}</option>`).join("")}</select><select class="inp" id="poFTrp" onchange="App.filterPendingOrders()"><option value="">All Transports</option>${allT.map(t=>`<option>${esc(t)}</option>`).join("")}</select><button class="btn btn-secondary" onclick="App.clearPendingOrderFilters()">Clear</button><button class="btn btn-success" onclick="App.exportPendingOrders()">📥 Export</button></div><div style="overflow-x:auto"><table class="tbl" id="poFTable"><thead><tr style="background:#1a237e;color:#fff">${["PO No","Party","Transport","Date","Product","Ordered","Dispatched","Pending Qty","Action"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${pendingOrderRowsHtml(all)}</tbody></table></div></div></div><div class="card"><div class="card-title">📦 Item-wise Pending Summary</div><div class="card-body">${itemWiseSummaryHtml(all)}</div></div>`;
}
function pendingOrderRowsHtml(rows){return rows.map(r=>`<tr><td>${esc(r.poNo)}</td><td>${esc(r.party)}</td><td>${esc(r.transport)}</td><td>${esc(fmtDate(r.date))}</td><td>${esc(r.productName)}</td><td>${esc(r.orderedQty)} ${esc(r.unit)}</td><td>${esc(r.dispatchedQty)}</td><td style="font-weight:700;color:#e65100">${esc(r.pendingQty)}</td><td>${!isRO()?`<button class="btn btn-sm btn-danger" onclick="App.cancelPendingQty(${r.poId},${r.itemId},${r.pendingQty})">Cancel Qty</button>`:"—"}</td></tr>`).join("")||`<tr><td colspan="9" style="text-align:center;color:#999;padding:24px">No pending orders</td></tr>`;}
function itemWiseSummaryHtml(rows){const itemSum={};rows.filter(r=>r.unit==="Cts").forEach(r=>{if(!itemSum[r.productName])itemSum[r.productName]={product:r.productName,pendingQty:0};itemSum[r.productName].pendingQty+=r.pendingQty;});const availMap=getAvailableStockMap();const vals=Object.values(itemSum);if(!vals.length)return`<div style="color:#999;text-align:center;padding:16px">No pending Cts orders</div>`;return`<div style="overflow-x:auto"><table class="tbl"><thead><tr style="background:#37474f;color:#fff"><th>Product</th><th style="color:#ffcc80">Pending Order (Cts)</th><th style="color:#a5d6a7">Available Stock (Cts)</th><th style="color:#90caf9">Available Cartons</th><th>Shortfall / Surplus</th></tr></thead><tbody>${vals.map(r=>{const av=availMap[r.product]||{availQty:0,availCartons:0};const diff=r.pendingQty-av.availQty;return`<tr><td><b>${esc(r.product)}</b></td><td style="font-weight:700;color:#e65100">${esc(r.pendingQty)}</td><td style="font-weight:700;color:#2e7d32">${esc(av.availQty)}</td><td style="font-weight:700;color:#1565c0">${esc(av.availCartons)} Ctn</td><td style="font-weight:700;color:${diff>0?"#c62828":diff<0?"#1565c0":"#555"}">${diff>0?"⚠️ Short: "+diff:diff<0?"✅ Extra: "+Math.abs(diff):"✅ Exact"}</td></tr>`;}).join("")}</tbody></table></div>`;}
const PendingOrderApp={
  filterPendingOrders(){const fp=document.getElementById("poFParty").value,fpr=document.getElementById("poFProd").value,fc=document.getElementById("poFCat").value,ft=document.getElementById("poFTrp").value;const catMap={};state.itemMaster.forEach(i=>{if(i.category)catMap[i.name]=i.category;});state.packings.forEach(p=>{if(p.category)catMap[p.productName]=p.category;});const rows=getPendingOrderRows().filter(r=>{if(fp&&r.party!==fp)return false;if(fpr&&r.productName!==fpr)return false;if(ft&&r.transport!==ft)return false;if(fc&&catMap[r.productName]!==fc)return false;return true;});document.querySelector("#poFTable tbody").innerHTML=pendingOrderRowsHtml(rows);},
  clearPendingOrderFilters(){["poFParty","poFProd","poFCat","poFTrp"].forEach(id=>document.getElementById(id).value="");this.filterPendingOrders();},
  exportPendingOrders(){const rows=getPendingOrderRows();exportCSV(["PO No","Party","Transport","Date","Product","Ordered","Dispatched","Pending"],rows.map(r=>[r.poNo,r.party,r.transport,fmtDate(r.date),r.productName,r.orderedQty,r.dispatchedQty,r.pendingQty]),"pending_orders.csv");},
  cancelPendingQty(poId,itemId,maxQty){const cq=Number(prompt(`Cancel karo (max ${maxQty}):`));if(!cq||cq<=0||cq>maxQty){alert("Invalid");return;}state.purchaseOrders=state.purchaseOrders.map(po=>po.id!==poId?po:{...po,items:po.items.map(i=>i.id===itemId?{...i,qty:Math.max(0,i.qty-cq),pendingQty:Math.max(0,(i.pendingQty||i.qty)-cq)}:i)});persist("pos",state.purchaseOrders);renderTabContent();}
};

// ── MT PENDING ────────────────────────────────────────────
// Check if MT PO is fully dispatched
function isMtPoDispatched(poId) {
  const dispMap={};
  state.mtDispatches.forEach(d=>(d.items||[]).forEach(i=>{
    const k=i.poItemId;
    if(!dispMap[k])dispMap[k]={box:0,pcs:0};
    dispMap[k].box+=Number(i.qtyBox||0);
    dispMap[k].pcs+=Number(i.qtyPcs||0);
  }));
  const po = state.mtPos.find(p=>p.id==poId);
  if(!po) return false;
  return (po.items||[]).every(item=>{
    const disp=dispMap[item.id]||{box:0,pcs:0};
    return disp.box >= Number(item.qtyBox||0) && disp.pcs >= Number(item.qtyPcs||0);
  });
}

function getMtPendingRows(){const dispMap={};state.mtDispatches.forEach(d=>(d.items||[]).forEach(i=>{const k=i.poItemId;if(!dispMap[k])dispMap[k]={box:0,pcs:0};dispMap[k].box+=Number(i.qtyBox||0);dispMap[k].pcs+=Number(i.qtyPcs||0);}));return state.mtPos
    .filter(po=>!isMtPoDispatched(po.id)) // Only pending POs
    .flatMap(po=>(po.items||[]).map(item=>{
      const disp=dispMap[item.id]||{box:0,pcs:0};
      const pB=Number(item.qtyBox||0)-disp.box,pP=Number(item.qtyPcs||0)-disp.pcs;
      const days=getDays(po.dispatchDate);
      return{poId:po.id,poNo:po.poNo,dc:po.dc,poDate:po.poDate,deliveryDate:po.deliveryDate,dispatchDate:po.dispatchDate,days,itemDesc:item.itemDesc,eanNo:item.eanNo,ordBox:item.qtyBox,ordPcs:item.qtyPcs,dispBox:disp.box,dispPcs:disp.pcs,pendBox:pB,pendPcs:pP,itemId:item.id};
    })).filter(r=>r.pendBox>0||r.pendPcs>0);}
function mtPendingItemSummaryHtml(rows){
  // Item-wise summary
  const sumMap={};
  rows.forEach(r=>{
    if(!sumMap[r.itemDesc])sumMap[r.itemDesc]={itemDesc:r.itemDesc,eanNo:r.eanNo,ordBox:0,ordPcs:0,dispBox:0,dispPcs:0,pendBox:0,pendPcs:0};
    sumMap[r.itemDesc].ordBox+=Number(r.ordBox||0);
    sumMap[r.itemDesc].ordPcs+=Number(r.ordPcs||0);
    sumMap[r.itemDesc].dispBox+=Number(r.dispBox||0);
    sumMap[r.itemDesc].dispPcs+=Number(r.dispPcs||0);
    sumMap[r.itemDesc].pendBox+=Number(r.pendBox||0);
    sumMap[r.itemDesc].pendPcs+=Number(r.pendPcs||0);
  });
  const vals=Object.values(sumMap);
  if(!vals.length)return`<div style="color:#999;text-align:center;padding:16px">No pending items</div>`;
  const totalPendBox=vals.reduce((s,r)=>s+r.pendBox,0);
  const totalPendPcs=vals.reduce((s,r)=>s+r.pendPcs,0);
  return`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr style="background:#37474f;color:#fff">
      <th>Item</th><th>EAN</th>
      <th style="color:#ffcc80">Ord Box</th><th style="color:#ffcc80">Ord Pcs</th>
      <th style="color:#a5d6a7">Disp Box</th><th style="color:#a5d6a7">Disp Pcs</th>
      <th style="color:#ef9a9a">Pend Box</th><th style="color:#ef9a9a">Pend Pcs</th>
      <th>Status</th>
    </tr></thead>
    <tbody>
      ${vals.map(r=>{
        const pct=r.ordBox>0?Math.round((r.dispBox/r.ordBox)*100):0;
        const statusColor=r.pendBox===0?"#2e7d32":pct>=50?"#e65100":"#c62828";
        const statusText=r.pendBox===0?"✅ Complete":pct>=50?"🟠 "+pct+"% done":"🔴 "+pct+"% done";
        return`<tr>
          <td><b>${esc(r.itemDesc)}</b></td>
          <td style="font-size:11px">${esc(r.eanNo||"—")}</td>
          <td>${esc(r.ordBox)}</td><td>${esc(r.ordPcs)}</td>
          <td style="color:#2e7d32;font-weight:600">${esc(r.dispBox)}</td><td style="color:#2e7d32;font-weight:600">${esc(r.dispPcs)}</td>
          <td style="font-weight:700;color:#e65100">${esc(r.pendBox)}</td><td style="font-weight:700;color:#e65100">${esc(r.pendPcs)}</td>
          <td><span style="font-size:11px;font-weight:700;color:${statusColor}">${statusText}</span></td>
        </tr>`;
      }).join("")}
      <tr style="background:#e8eaf6;font-weight:700">
        <td colspan="6" style="text-align:right;padding-right:12px">Total Pending:</td>
        <td style="color:#c62828;font-size:15px">${totalPendBox} B</td>
        <td style="color:#c62828;font-size:15px">${totalPendPcs} P</td>
        <td></td>
      </tr>
    </tbody>
  </table></div>`;
}

// ── MT PACKING ────────────────────────────────────────────
function getMtItemStats(){const stats={};state.mtItems.forEach(item=>{let tPB=0,tPP=0;state.mtPos.forEach(po=>(po.items||[]).forEach(pi=>{if(pi.mtItemId==item.id||pi.itemDesc===item.itemDesc){tPB+=Number(pi.qtyBox||0);tPP+=Number(pi.qtyPcs||0);}}));let tDB=0,tDP=0;state.mtDispatches.forEach(d=>(d.items||[]).forEach(di=>{if(di.itemDesc===item.itemDesc){tDB+=Number(di.qtyBox||0);tDP+=Number(di.qtyPcs||0);}}));let tPrB=0,tPrP=0;state.mtPackings.forEach(p=>{if(p.mtItemId==item.id){if(p.productionUnit==="Box"){tPrB+=Number(p.productionQty||0);tPrP+=Number(p.productionQty||0)*Number(item.pcsPerBox||1);}else{tPrP+=Number(p.productionQty||0);tPrB+=item.pcsPerBox?Math.floor(Number(p.productionQty||0)/Number(item.pcsPerBox)):0;}}});stats[item.id]={tPB,tPP,tDB,tDP,tPrB,tPrP,remB:Math.max(0,tPB-tPrB),remP:Math.max(0,tPP-tPrP),pendB:tPB-tDB};});return stats;}
function mtPackingHistoryRows(){return[...state.mtPackings].reverse().map(p=>{const bQ=p.productionUnit==="Box"?p.productionQty:(p.pcsPerBox?Math.floor(Number(p.productionQty)/Number(p.pcsPerBox)):"—");const pQ=p.productionUnit==="Pcs"?p.productionQty:(p.pcsPerBox?Number(p.productionQty)*Number(p.pcsPerBox):"—");return`<tr><td>${esc(fmtDate(p.date))}</td><td><b>${esc(p.itemDesc)}</b></td><td>${esc(p.eanNo)}</td><td>${esc(p.pcsPerBox)}</td><td style="font-weight:700;color:#2e7d32">${esc(p.productionQty)}</td><td>${esc(p.productionUnit)}</td><td>${bQ}</td><td>${pQ}</td><td>${esc(p.batchNo)}</td><td>${esc(p.remark)}</td><td><span style="font-size:11px;color:#1565c0;font-weight:600">${esc(p.savedBy||"—")}</span></td><td>${!isRO()?`<button class="btn btn-sm btn-primary" onclick="App.editMtPacking(${p.id})">Edit</button> <button class="btn btn-sm btn-danger" onclick="App.deleteMtPacking(${p.id})">Del</button>`:""}</td></tr>`;}).join("")||`<tr><td colspan="12" style="text-align:center;color:#999;padding:24px">No entries yet</td></tr>`;}
function renderMTPackingTab(){
  const ed=temp.editMtPackingId?state.mtPackings.find(p=>p.id===temp.editMtPackingId):null;const stats=getMtItemStats();
  return`${roBanner()}<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-primary" onclick="App.openMtItemModal()">📦 MT Item Master (${state.mtItems.length})</button></div><div class="card"><div class="card-title">📊 MT Item-wise Production Summary</div><div class="card-body" style="overflow-x:auto">${state.mtItems.length===0?`<div style="color:#999;text-align:center;padding:20px">MT Item Master mein items add karo</div>`:`<table class="tbl"><thead><tr style="background:#1a237e;color:#fff">${["Item","EAN","Pcs/Box","PO Box","PO Pcs","Prod Box","Prod Pcs","Disp Box","Disp Pcs","Rem Prod B","Rem Prod P","Pend Disp B"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${state.mtItems.map(item=>{const s=stats[item.id]||{};return`<tr><td><b>${esc(item.itemDesc)}</b></td><td>${esc(item.eanNo)}</td><td>${esc(item.pcsPerBox)}</td><td>${s.tPB||0}</td><td>${s.tPP||0}</td><td style="color:#2e7d32;font-weight:700">${s.tPrB||0}</td><td style="color:#2e7d32;font-weight:700">${s.tPrP||0}</td><td>${s.tDB||0}</td><td>${s.tDP||0}</td><td style="font-weight:700;color:${(s.remB||0)>0?"#e65100":"#2e7d32"}">${s.remB||0}</td><td style="font-weight:700;color:${(s.remP||0)>0?"#e65100":"#2e7d32"}">${s.remP||0}</td><td style="font-weight:700;color:${(s.pendB||0)>0?"#1565c0":"#555"}">${s.pendB||0}</td></tr>`;}).join("")}</tbody></table>`}</div></div><div class="card"><div class="card-title">${ed?"✏️ Edit Production Entry":"🏭 Add MT Production"}</div><div class="card-body"><div class="grid2"><div><label class="lbl">Date *</label><input class="inp" type="date" id="mtpkDate" value="${ed?ed.date:todayStr()}"></div><div><label class="lbl">Item Select *</label><select class="inp" id="mtpkItem"><option value="">-- Select --</option>${state.mtItems.map(i=>`<option value="${i.id}" ${ed&&ed.mtItemId==i.id?"selected":""}>${esc(i.itemDesc)}${i.eanNo?" (EAN: "+esc(i.eanNo)+")":""}</option>`).join("")}</select></div><div><label class="lbl">Production Qty *</label><input class="inp" type="number" id="mtpkQty" value="${ed?esc(ed.productionQty):""}" placeholder="0"></div><div><label class="lbl">Unit</label><select class="inp" id="mtpkUnit">${["Box","Pcs","Set"].map(u=>`<option ${ed&&ed.productionUnit===u?"selected":""}>${u}</option>`).join("")}</select></div><div><label class="lbl">Batch No</label><input class="inp" id="mtpkBatch" value="${ed?esc(ed.batchNo):""}"></div><div><label class="lbl">Remark</label><input class="inp" id="mtpkRemark" value="${ed?esc(ed.remark):""}"></div></div><div style="display:flex;gap:10px;margin-top:16px">${!isRO()?`<button class="btn btn-primary" onclick="App.saveMtPacking()">${ed?"Update":"💾 Save Production"}</button>`:""} ${!isRO()&&ed?`<button class="btn btn-secondary" onclick="App.cancelEditMtPacking()">Cancel</button>`:""}</div></div></div><div class="card"><div class="card-title">📋 Production History</div><div class="card-body" style="overflow-x:auto"><table class="tbl"><thead><tr style="background:#1a237e;color:#fff">${["Date","Item","EAN","Pcs/Box","Qty","Unit","=Box","=Pcs","Batch","Remark","By","Actions"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody id="mtPackingHistoryBody">${mtPackingHistoryRows()}</tbody></table></div></div>`;
}
const MTPackingApp={
  saveMtPacking(){const id=document.getElementById("mtpkItem").value,qty=document.getElementById("mtpkQty").value;if(!id){alert("Item select karo");return;}if(!qty||Number(qty)<=0){alert("Production Qty required");return;}const mi=state.mtItems.find(i=>i.id==id);const entry={id:temp.editMtPackingId||uid(),date:document.getElementById("mtpkDate").value,mtItemId:id,productionQty:Number(qty),productionUnit:document.getElementById("mtpkUnit").value,batchNo:document.getElementById("mtpkBatch").value,remark:document.getElementById("mtpkRemark").value,itemDesc:mi?.itemDesc,eanNo:mi?.eanNo,pcsPerBox:mi?.pcsPerBox,savedAt:nowStr()};if(temp.editMtPackingId){state.mtPackings=state.mtPackings.map(p=>p.id===entry.id?entry:p);temp.editMtPackingId=null;}else state.mtPackings.push(entry);persist("mt_packings",state.mtPackings);renderTabContent();},
  editMtPacking(id){temp.editMtPackingId=id;renderTabContent();window.scrollTo(0,0);},
  cancelEditMtPacking(){temp.editMtPackingId=null;renderTabContent();},
  deleteMtPacking(id){if(!confirm("Delete?"))return;state.mtPackings=state.mtPackings.filter(p=>p.id!==id);persist("mt_packings",state.mtPackings);renderTabContent();}
};

// ── USER MANAGEMENT ───────────────────────────────────────
function renderUserManagementTab(){
  if(state.currentUser.role!=="admin")return"";
  const ed=temp.editUserId?state.users.find(u=>u.id===temp.editUserId):null;const am=ed?(ed.accessMode||"custom"):"custom";
  return`<div class="card"><div class="card-title">${ed?"✏️ Edit User":"👥 Add New User"}</div><div class="card-body"><div class="grid2"><div><label class="lbl">Full Name *</label><input class="inp" id="umName" value="${ed?esc(ed.name):""}"></div><div><label class="lbl">Username *</label><input class="inp" id="umUsername" value="${ed?esc(ed.username):""}" ${ed?"disabled":""}></div><div><label class="lbl">Password ${ed?"(blank=keep)":""} *</label><input class="inp" type="password" id="umPassword"></div><div><label class="lbl">Role</label><select class="inp" id="umRole" onchange="App.renderUserAccessSection()"><option value="user" ${ed&&ed.role==="user"?"selected":""}>User</option><option value="admin" ${ed&&ed.role==="admin"?"selected":""}>Admin</option></select></div></div><div id="umAccessSection">${userAccessSectionHtml(ed,am)}</div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-primary" onclick="App.saveUser()">${ed?"Update":"Add User"}</button>${ed?`<button class="btn btn-secondary" onclick="App.cancelEditUser()">Cancel</button>`:""}</div></div></div><div class="card"><div class="card-title">👥 All Users</div><div class="card-body" style="overflow-x:auto"><table class="tbl"><thead><tr style="background:#1a237e;color:#fff">${["Name","Username","Role","Access","Actions"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody id="userListBody">${userListRows()}</tbody></table></div></div>`;
}
function userAccessSectionHtml(ed,am){const role=ed?ed.role:"user";if(role==="admin")return"";const perms=ed?(ed.permissions||{}):{};return`<div style="margin-top:14px"><label class="lbl">Access Mode</label><div style="display:flex;gap:10px;margin-bottom:14px">${[{val:"custom",label:"🔧 Custom"},{val:"readonly",label:"👁 Read Only"},{val:"full",label:"✅ Full Access"}].map(m=>`<label style="flex:1;border:2px solid ${am===m.val?"#1a237e":"#ddd"};border-radius:10px;padding:10px 14px;cursor:pointer;text-align:center;background:${am===m.val?"#e8eaf6":"#fafafa"}"><input type="radio" name="umAccessMode" value="${m.val}" ${am===m.val?"checked":""} onchange="App.renderUserAccessSection()" style="display:none"><div style="font-weight:700;font-size:13px">${m.label}</div></label>`).join("")}</div>${am==="custom"?`<div><label class="lbl">Tab Permissions</label><div style="display:flex;flex-wrap:wrap;gap:8px">${PERMS.map(p=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;background:${perms[p]?"#e3f2fd":"#f5f5f5"};padding:7px 13px;border-radius:20px;border:1px solid ${perms[p]?"#1565c0":"#ddd"}"><input type="checkbox" id="umPerm_${p}" ${perms[p]?"checked":""}>${PERM_LABELS[p]}</label>`).join("")}</div></div>`:""}</div>`;}
function userListRows(){return state.users.map(u=>`<tr><td><b>${esc(u.name)}</b></td><td>${esc(u.username)}</td><td><span class="badge" style="background:${u.role==="admin"?"#1a237e":"#37474f"}">${esc(u.role)}</span></td><td>${u.role==="admin"?"All":u.readOnly?"👁 Read Only":u.accessMode==="full"?"✅ Full":PERMS.filter(p=>u.permissions&&u.permissions[p]).map(p=>PERM_LABELS[p]).join(", ")||"None"}</td><td><button class="btn btn-sm btn-primary" onclick="App.editUser(${u.id})">Edit</button> ${u.id!==state.currentUser.id?`<button class="btn btn-sm btn-danger" onclick="App.deleteUser(${u.id})">Del</button>`:""}</td></tr>`).join("");}
const UserManagementApp={
  renderUserAccessSection(){const role=document.getElementById("umRole").value;const mode=document.querySelector('input[name="umAccessMode"]:checked')?.value||"custom";const ed=temp.editUserId?state.users.find(u=>u.id===temp.editUserId):null;document.getElementById("umAccessSection").innerHTML=role==="admin"?"":userAccessSectionHtml({...ed,role,accessMode:mode},mode);},
  saveUser(){const username=document.getElementById("umUsername").value.trim(),name=document.getElementById("umName").value.trim(),password=document.getElementById("umPassword").value.trim();if(!username||!name){alert("Username and Name required");return;}if(!temp.editUserId&&!password){alert("Password required");return;}if(!temp.editUserId&&state.users.find(u=>u.username===username)){alert("Username exists");return;}const role=document.getElementById("umRole").value;let entry={id:temp.editUserId||uid(),username,name,role};if(password)entry.password=password;else if(temp.editUserId)entry.password=state.users.find(u=>u.id===temp.editUserId).password;if(role==="user"){const mode=document.querySelector('input[name="umAccessMode"]:checked')?.value||"custom";entry.accessMode=mode;if(mode==="readonly"){entry.readOnly=true;entry.permissions=Object.fromEntries(PERMS.map(p=>[p,true]));}else if(mode==="full"){entry.readOnly=false;entry.permissions=Object.fromEntries(PERMS.map(p=>[p,true]));}else{entry.readOnly=false;entry.permissions=Object.fromEntries(PERMS.map(p=>[p,!!document.getElementById("umPerm_"+p)?.checked]));}}else{entry.permissions={};entry.readOnly=false;}if(temp.editUserId){state.users=state.users.map(u=>u.id===entry.id?entry:u);temp.editUserId=null;}else state.users.push(entry);persist("users",state.users);renderTabContent();},
  editUser(id){temp.editUserId=id;renderTabContent();window.scrollTo(0,0);},
  cancelEditUser(){temp.editUserId=null;renderTabContent();},
  deleteUser(id){if(id===state.currentUser.id){alert("Cannot delete yourself");return;}if(!confirm("Delete?"))return;state.users=state.users.filter(u=>u.id!==id);persist("users",state.users);renderTabContent();}
};

// ── AUTH + GLOBAL APP ──────────────────────────────────────
const AuthApp={
  login(){const u=document.getElementById("loginUser").value,p=document.getElementById("loginPass").value;const found=state.users.find(x=>x.username===u&&x.password===p);const el=document.getElementById("loginErr");if(found){state.currentUser=found;GSync.loadAll().then(updated=>{render();GSync.startAutoSync();});}else{el.style.display="block";el.textContent="⚠️ Invalid username or password";}},
  logout(){state.currentUser=null;GSync.stopAutoSync();render();},
  switchTab(tab){state.activeTab=tab;temp.editPackingId=null;temp.editPOId=null;temp.editMtPoId=null;temp.editMtPackingId=null;temp.editUserId=null;temp.poItems=[];temp.dispatchItems=[];temp.mtPoItems=[];temp.mtDispatchItems=[];render();}
};

const App=Object.assign({},PackingApp,PendingStockApp,StockSummaryApp,DispatchApp,DispatchRegisterApp,
  POApp,PendingOrderApp,ItemMasterApp,MtItemModalApp,MTPoApp,MTDispatchApp,MTPendingApp,MTPackingApp,
  UserManagementApp,AuthApp);
window.App=App; window.AC=AC; window.GSync=GSync;

// ── INIT ──────────────────────────────────────────────────
(function init(){
  const map={users:"users",packings:"packings",categories:"categories",dispatches:"dispatches",
    purchaseOrders:"pos",mtPos:"mt_pos",mtDispatches:"mt_dispatches",batchOptions:"batch_options",
    mtItems:"mt_items",mtPackings:"mt_packings",itemMaster:"item_master"};
  Object.entries(map).forEach(([sk,dbk])=>{const d=DB.get(dbk);if(d)state[sk]=d;});
  render();
  setupEnterNav();
  // Auto pull latest data from Google Sheets on page load
  GSync.loadAll().then(updated=>{ if(updated) render(); });
  // Start auto sync if user is already logged in
  if(state.currentUser) GSync.startAutoSync();
  // Check for any unsent saves from previous session (browser was closed mid-save)
  if(SaveQueue.hasItems()) {
    console.log("Unsent saves found from last session — retrying...");
    SyncBar.show("saving", "☁️ Pichli baar ki pending entries sync ho rahi hain...");
    const q = SaveQueue.get();
    Object.assign(_pendingSave, q);
    setTimeout(() => GSync.flushSave(), 2000);
  }

  // ── PWA Service Worker ──────────────────────────────────
  if("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then(() => {
      console.log("Service Worker registered!");
    }).catch(e => console.log("SW error:", e));
  }

  // ── PWA Install Prompt ──────────────────────────────────
  let _installPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    _installPrompt = e;
    // Show install button in topbar
    const btn = document.getElementById("installBtn");
    if(btn) btn.style.display = "inline-block";
  });
  window.installApp = function() {
    if(_installPrompt) {
      _installPrompt.prompt();
      _installPrompt.userChoice.then(() => {
        _installPrompt = null;
        const btn = document.getElementById("installBtn");
        if(btn) btn.style.display = "none";
      });
    }
  };
})();
</script>
</body>
</html>
